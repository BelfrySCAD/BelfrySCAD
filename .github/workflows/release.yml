name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --frozen --python 3.12

      - name: Build macOS app
        run: |
          uv run --python 3.12 briefcase create macOS app
          uv run --python 3.12 briefcase build macOS app
          uv run --python 3.12 briefcase package macOS app --adhoc-sign

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm64
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --frozen --python 3.12

      - name: Build Windows installer
        run: |
          uv run --python 3.12 briefcase create windows app
          uv run --python 3.12 briefcase build windows app
          uv run --python 3.12 briefcase package windows app

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-x86_64
          path: dist/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libegl1-mesa-dev

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --frozen --python 3.12

      - name: Build Linux AppImage
        run: |
          uv run --python 3.12 briefcase create linux appimage
          uv run --python 3.12 briefcase build linux appimage
          uv run --python 3.12 briefcase package linux appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-x86_64
          path: dist/*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true
