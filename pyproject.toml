[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "neuscad"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "PySide6",
    "manifold3d",
    "moderngl",
    "numpy",
    "lib3mf",
    "setproctitle>=1.3.7",
    "openscad_parser>=2.5.1",
]

[project.scripts]
neuscad = "neuscad.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/neuscad"]

[tool.uv]
package = true

[tool.uv.sources]
openscad_parser = { path = "../openscad_parser", editable = true }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
]
