[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "neuscad"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "PySide6",
    "manifold3d",
    "moderngl",
    "numpy",
]

[project.scripts]
neuscad = "neuscad.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/neuscad"]

[tool.uv]
package = true
