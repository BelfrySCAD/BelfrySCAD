<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Cube faces: olive/yellow-green tones -->
    <linearGradient id="cube-top" x1="350" y1="200" x2="512" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8c820"/>
      <stop offset="100%" stop-color="#a0a010"/>
    </linearGradient>
    <linearGradient id="cube-right" x1="512" y1="380" x2="720" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#909010"/>
      <stop offset="100%" stop-color="#707008"/>
    </linearGradient>
    <linearGradient id="cube-left" x1="300" y1="380" x2="512" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#606008"/>
      <stop offset="100%" stop-color="#808010"/>
    </linearGradient>

    <!-- Sphere gradient -->
    <radialGradient id="sphere" cx="460" cy="420" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50d050"/>
      <stop offset="40%" stop-color="#30b030"/>
      <stop offset="80%" stop-color="#188818"/>
      <stop offset="100%" stop-color="#086808"/>
    </radialGradient>

    <!-- Hole interior shading -->
    <radialGradient id="hole-interior" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a0a018"/>
      <stop offset="100%" stop-color="#505008"/>
    </radialGradient>

    <!-- Rim highlight for holes -->
    <linearGradient id="rim-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d028"/>
      <stop offset="100%" stop-color="#808010"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <g transform="translate(512,500) scale(1.2) translate(-512,-500)">
  <!--
    Isometric cube with sphere-in-box (cage).
    Cube centre ~(512, 500), side ~330px isometric.
    e_h = cos30 * 330 ≈ 286, e_v = sin30 * 330 = 165

    Vertices:
      Top:    (512, 170)
      Right:  (798, 335)
      Front:  (512, 500)
      Left:   (226, 335)
      RBot:   (798, 665)
      FBot:   (512, 830)
      LBot:   (226, 665)
  -->

  <!-- BACK FACES (visible through holes) -->

  <!-- Back-right face (behind left face holes) -->
  <polygon points="798,335 798,665 512,830 512,500" fill="#585808" opacity="0.4"/>
  <!-- Back-left face (behind right face holes) -->
  <polygon points="226,335 512,500 512,830 226,665" fill="#484808" opacity="0.4"/>
  <!-- Bottom face (behind top face holes) -->
  <polygon points="226,665 512,830 798,665 512,500" fill="#404008" opacity="0.3"/>

  <!-- SPHERE (rendered behind front cube faces, visible through holes) -->
  <circle cx="512" cy="490" r="220" fill="url(#sphere)" filter="url(#shadow)"/>
  <!-- Specular highlight on sphere -->
  <ellipse cx="445" cy="410" rx="80" ry="55" fill="rgba(255,255,200,0.15)"
           transform="rotate(-20,445,410)"/>

  <!-- LEFT FACE with circular hole -->
  <path d="M 226,335 L 512,500 L 512,830 L 226,665 Z" fill="url(#cube-left)"/>
  <!-- Cut elliptical hole in left face -->
  <!-- Hole centre: midpoint of left face = (369, 582.5) -->
  <!-- Ellipse on isometric left face: skewed circle -->
  <clipPath id="left-face-clip">
    <path d="M 226,335 L 512,500 L 512,830 L 226,665 Z"/>
  </clipPath>
  <!-- Hole in left face: ellipse approximating a circle on the iso plane -->
  <g clip-path="url(#left-face-clip)">
    <!-- Fill face, then cut hole by overlaying background -->
    <ellipse cx="369" cy="582" rx="155" ry="90"
             transform="rotate(60,369,582)"
             fill="#1a1a1a"/>
    <ellipse cx="369" cy="582" rx="155" ry="90"
             transform="rotate(60,369,582)"
             fill="none" stroke="#a0a018" stroke-width="4"/>
  </g>

  <!-- RIGHT FACE with circular hole -->
  <path d="M 512,500 L 798,335 L 798,665 L 512,830 Z" fill="url(#cube-right)"/>
  <clipPath id="right-face-clip">
    <path d="M 512,500 L 798,335 L 798,665 L 512,830 Z"/>
  </clipPath>
  <g clip-path="url(#right-face-clip)">
    <ellipse cx="655" cy="582" rx="155" ry="90"
             transform="rotate(120,655,582)"
             fill="#1a1a1a"/>
    <ellipse cx="655" cy="582" rx="155" ry="90"
             transform="rotate(120,655,582)"
             fill="none" stroke="#707008" stroke-width="3"/>
  </g>

  <!-- TOP FACE with circular hole -->
  <path d="M 512,170 L 798,335 L 512,500 L 226,335 Z" fill="url(#cube-top)"/>
  <clipPath id="top-face-clip">
    <path d="M 512,170 L 798,335 L 512,500 L 226,335 Z"/>
  </clipPath>
  <g clip-path="url(#top-face-clip)">
    <ellipse cx="512" cy="335" rx="160" ry="92"
             fill="#1a1a1a"/>
    <ellipse cx="512" cy="335" rx="160" ry="92"
             fill="none" stroke="#c8c828" stroke-width="4"/>
  </g>

  <!-- Sphere parts visible through holes (drawn on top for depth) -->
  <!-- Sphere visible through top hole -->
  <clipPath id="top-hole-sphere">
    <ellipse cx="512" cy="335" rx="158" ry="90"/>
  </clipPath>
  <g clip-path="url(#top-face-clip)">
    <g clip-path="url(#top-hole-sphere)">
      <circle cx="512" cy="490" r="220" fill="url(#sphere)"/>
      <ellipse cx="470" cy="380" rx="60" ry="35" fill="rgba(255,255,200,0.12)"
               transform="rotate(-15,470,380)"/>
    </g>
  </g>

  <!-- Sphere visible through left hole -->
  <clipPath id="left-hole-sphere">
    <ellipse cx="369" cy="582" rx="153" ry="88"
             transform="rotate(60,369,582)"/>
  </clipPath>
  <g clip-path="url(#left-face-clip)">
    <g clip-path="url(#left-hole-sphere)">
      <circle cx="512" cy="490" r="220" fill="url(#sphere)"/>
    </g>
  </g>

  <!-- Sphere visible through right hole -->
  <clipPath id="right-hole-sphere">
    <ellipse cx="655" cy="582" rx="153" ry="88"
             transform="rotate(120,655,582)"/>
  </clipPath>
  <g clip-path="url(#right-face-clip)">
    <g clip-path="url(#right-hole-sphere)">
      <circle cx="512" cy="490" r="220" fill="url(#sphere)"/>
    </g>
  </g>

  <!-- CUBE EDGE HIGHLIGHTS -->
  <!-- Top edges -->
  <polyline points="512,170 798,335 512,500 226,335 512,170"
            fill="none" stroke="rgba(220,220,40,0.35)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Vertical edges -->
  <line x1="512" y1="500" x2="512" y2="830" stroke="rgba(200,200,30,0.30)" stroke-width="2.5"/>
  <line x1="798" y1="335" x2="798" y2="665" stroke="rgba(160,160,20,0.25)" stroke-width="2"/>
  <line x1="226" y1="335" x2="226" y2="665" stroke="rgba(140,140,15,0.20)" stroke-width="2"/>
  <!-- Bottom edges -->
  <line x1="798" y1="665" x2="512" y2="830" stroke="rgba(140,140,15,0.20)" stroke-width="2"/>
  <line x1="226" y1="665" x2="512" y2="830" stroke="rgba(120,120,10,0.18)" stroke-width="2"/>
  </g>

</svg>
