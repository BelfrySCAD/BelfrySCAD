<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 32 32"
   width="32"
   height="32"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- call-site dot (matches debug-step-into.svg/debug-step-out.svg) -->
  <ellipse cx="16" cy="4.5" rx="1.5" ry="1.4"
           fill="#444444" stroke="#444444" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" />
  <!-- vertical shaft -->
  <line x1="16" y1="7.5" x2="16" y2="17"
        stroke="#444444" stroke-width="2.5" stroke-linecap="round" />
  <!-- arrowhead pointing down -->
  <polyline points="12,14 16,18.5 20,14"
            fill="none" stroke="#444444" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" />
  <!-- curly brace: the module call's { } children block -->
  <path d="M 19,19.5
           C 16.5,19.5 17,21.8 17,23
           C 17,23.9 16,24.3 14.3,25
           C 16,25.7 17,26.1 17,27
           C 17,28.2 16.5,30.5 19,30.5"
        fill="none" stroke="#444444" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" />
</svg>
